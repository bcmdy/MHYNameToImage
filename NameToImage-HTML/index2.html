<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原神ID生成图片</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans SC', sans-serif; background: #f5f6f7; min-height: 100vh; padding: 20px; }
.container { max-width: 600px; margin: 0 auto; }
h1 { text-align: center; color: #323a45; margin-bottom: 30px; }
.input-group { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
.input-row { display: flex; gap: 10px; }
input[type="text"] { flex: 1; padding: 12px 16px; border: 1px solid #dfe1e6; border-radius: 6px; font-size: 16px; outline: none; }
input[type="text"]:focus { border-color: #647491; }
button { padding: 12px 24px; background: #647491; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
button:hover { background: #505d7a; }
button:disabled { background: #ccc; cursor: not-allowed; }
.options { margin-top: 15px; display: flex; gap: 20px; }
.checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: #505d7a; }
.font-status { margin-top: 15px; padding: 10px 15px; border-radius: 6px; font-size: 14px; display: none; }
.font-status.success { display: block; background: #d4edda; color: #155724; }
.font-status.fail { display: block; background: #f8d7da; color: #721c24; }
.font-status.loading { display: block; background: #fff3cd; color: #856404; }
.preview { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.preview h3 { color: #505d7a; margin-bottom: 15px; }
.preview-list { display: flex; flex-wrap: wrap; gap: 15px; }
.preview-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.preview-item img { image-rendering: pixelated; }
.preview-item span { font-size: 12px; color: #888; }
.download-btn { display: inline-block; padding: 8px 16px; background: #f5f6f7; color: #505d7a; border: 1px solid #dfe1e6; border-radius: 4px; font-size: 14px; text-decoration: none; }
.download-btn:hover { background: #647491; color: #fff; }
</style>
</head>
<body>
<div class="container">
  <h1>原神ID生成图片</h1>
  <div class="input-group">
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="请输入游戏ID名称" maxlength="12" disabled>
      <button onclick="generate()" id="generateBtn" disabled>生成</button>
    </div>
    <div class="options">
      <label class="checkbox-label">
        <input type="checkbox" id="markCheck" checked>
        生成备注版
      </label>
    </div>
    <div class="font-status loading" id="fontStatus">正在初始化...</div>
  </div>
  <div class="preview" id="previewSection" style="display:none;">
    <h3>预览</h3>
    <div class="preview-list" id="previewList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script>
const fontUrl = 'https://fastly.jsdelivr.net/gh/bcmdy/MHYNameToImage@main/Resources/HYW.ttf';
let font = null;
let isReady = false;

function setStatus(msg, type) {
    const el = document.getElementById('fontStatus');
    el.className = 'font-status ' + type;
    el.textContent = msg;
}

function setInputs(enabled) {
    document.getElementById('nameInput').disabled = !enabled;
    document.getElementById('generateBtn').disabled = !enabled;
    isReady = enabled;
}

async function initFont() {
    setInputs(false);
    setStatus('正在加载 opentype.js...', 'loading');

    // 等待 opentype.js 脚本就绪（处理 CDN 慢的情况）
    let attempts = 0;
    while (typeof opentype === 'undefined' && attempts < 50) {
        await new Promise(r => setTimeout(r, 100));
        attempts++;
    }
    if (typeof opentype === 'undefined') {
        setStatus('opentype.js 加载失败，请检查网络后刷新', 'fail');
        return;
    }

    setStatus('正在下载 HYW 字体...', 'loading');
    try {
        font = await opentype.load(fontUrl);
        setStatus('字体加载成功！', 'success');
        setInputs(true);
    } catch (e) {
        console.error(e);
        setStatus('字体加载失败: ' + e.message, 'fail');
    }
}

function drawGlyphToCanvas(text, fontSize, color, bgColor) {
    const scale = fontSize / font.unitsPerEm;
    
    let totalWidth = 0;
    const glyphs = [];
    for (let i = 0; i < text.length; i++) {
        const glyph = font.charToGlyph(text[i]);
        glyphs.push(glyph);
        totalWidth += glyph.advanceWidth * scale;
    }
    
    const paddingX = 3;
    const width = Math.ceil(totalWidth + paddingX);
    const height = 28;
    
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, width, height);
    
    // 基线计算与 Go 一致: y = (height + fontSize) / 2 - 4 = 22
    const baselineY = (height + fontSize) / 2 - 4;
    let x = paddingX;
    
    for (const glyph of glyphs) {
        const path = glyph.getPath(x, baselineY, fontSize);
        
        ctx.save();
        ctx.fillStyle = color;
        ctx.beginPath();
        
        for (const cmd of path.commands) {
            switch (cmd.type) {
                case 'M': ctx.moveTo(cmd.x, cmd.y); break;
                case 'L': ctx.lineTo(cmd.x, cmd.y); break;
                case 'Q': ctx.quadraticCurveTo(cmd.x1, cmd.y1, cmd.x, cmd.y); break;
                case 'C': ctx.bezierCurveTo(cmd.x1, cmd.y1, cmd.x2, cmd.y2, cmd.x, cmd.y); break;
                case 'Z': ctx.closePath(); break;
            }
        }
        ctx.fill();
        ctx.restore();
        
        x += glyph.advanceWidth * scale;
    }
    
    return canvas;
}

function generate() {
    if (!isReady || !font) {
        alert('字体尚未加载完成，请稍候');
        return;
    }
    
    const name = document.getElementById('nameInput').value.trim();
    if (!name) { alert('请输入ID名称'); return; }
    
    const useMark = document.getElementById('markCheck').checked;
    const results = [];
    
    results.push({ name, canvas: drawGlyphToCanvas(name, 24, 'rgb(80,87,105)', 'rgb(245,246,247)') });
    
    if (useMark) {
        results.push({ name: name + '备注', canvas: drawGlyphToCanvas(name, 24, 'rgb(100,119,171)', 'rgb(245,246,247)') });
    }
    
    renderResults(results);
}

function renderResults(results) {
    const list = document.getElementById('previewList');
    list.innerHTML = '';
    results.forEach(item => {
        const url = item.canvas.toDataURL('image/png');
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.innerHTML = `<img src="${url}" width="${item.canvas.width}" height="${item.canvas.height}"><span>${item.name}</span><a href="${url}" download="${item.name}.png" class="download-btn">下载</a>`;
        list.appendChild(div);
    });
    document.getElementById('previewSection').style.display = 'block';
}

document.getElementById('nameInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') generate();
});

initFont();
</script>
</body>
</html>
