<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NameToImage WASM 测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f6f7; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #323a45; margin-bottom: 30px; }
        .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #323a45; font-weight: 500; }
        input[type="text"] { width: 100%; padding: 12px 16px; border: 1px solid #dfe1e6; border-radius: 6px; font-size: 16px; outline: none; }
        input[type="text"]:focus { border-color: #4c6ef5; }
        .checkbox-group { margin-bottom: 15px; }
        .checkbox-group label { display: flex; align-items: center; font-weight: normal; }
        .checkbox-group input { margin-right: 8px; }
        button { width: 100%; padding: 12px; background: #4c6ef5; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        button:hover { background: #364fc7; }
        button:disabled { background: #a2a2a2; cursor: not-allowed; }
        .result { margin-top: 20px; }
        .result h3 { margin-bottom: 10px; color: #323a45; }
        .result-item { margin-bottom: 15px; }
        .result-item label { margin-bottom: 5px; }
        .result-item img { max-width: 100%; border: 1px solid #dfe1e6; border-radius: 4px; }
        .loading { text-align: center; color: #666; }
        .error { color: #dc3545; padding: 10px; background: #f8d7da; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NameToImage WASM 测试</h1>
        <div class="card">
            <div class="input-group">
                <label for="name">账号名称</label>
                <input type="text" id="name" placeholder="请输入账号名称">
            </div>
            <div class="checkbox-group">
                <label><input type="checkbox" id="mark"> 生成备注版</label>
            </div>
            <button id="generate" disabled>加载中...</button>
            <div class="result" id="result"></div>
        </div>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        const go = new Go();
        const generateBtn = document.getElementById('generate');
        const resultDiv = document.getElementById('result');

        async function init() {
            try {
                const response = await fetch('main.wasm');
                const buffer = await response.arrayBuffer();
                const module = await WebAssembly.compile(buffer);
                const instance = await WebAssembly.instantiate(module, go.importObject);

                await go.run(instance);

                if (typeof loadFont === 'function') {
                    const fontResponse = await fetch('HYW.ttf');
                    const fontBuffer = await fontResponse.arrayBuffer();
                    loadFont(new Uint8Array(fontBuffer));
                    generateBtn.disabled = false;
                    generateBtn.textContent = '生成图片';
                } else {
                    showError('WASM 函数未加载');
                }
            } catch (err) {
                showError('初始化失败: ' + err.message);
            }
        }

        function showError(msg) {
            resultDiv.innerHTML = '<div class="error">' + msg + '</div>';
        }

        generateBtn.addEventListener('click', async () => {
            const name = document.getElementById('name').value.trim();
            const mark = document.getElementById('mark').checked;

            if (!name) {
                showError('请输入账号名称');
                return;
            }

            generateBtn.disabled = true;
            generateBtn.textContent = '生成中...';
            resultDiv.innerHTML = '';

            try {
                if (typeof generateImage === 'function') {
                    const result = generateImage(name, mark);
                    let html = '<div class="result-item"><label>普通版</label>';
                    html += '<img src="' + result.image + '"></div>';
                    if (result.imageMark) {
                        html += '<div class="result-item"><label>备注版</label>';
                        html += '<img src="' + result.imageMark + '"></div>';
                    }
                    resultDiv.innerHTML = html;
                }
            } catch (err) {
                showError('生成失败: ' + err.message);
            }

            generateBtn.disabled = false;
            generateBtn.textContent = '生成图片';
        });

        init();
    </script>
</body>
</html>
